<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot Website</title>

<!-- Zapier Chatbot -->
<script async type="module" src="https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0f172a;
  color: white;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: #020617;
}

nav h1 {
  color: #38bdf8;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
}

/* Hero Section */
.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h2 {
  font-size: 40px;
  margin-bottom: 20px;
}

.hero p {
  color: #94a3b8;
  margin-bottom: 30px;
}

.hero button {
  padding: 12px 25px;
  background: #38bdf8;
  border: none;
  color: black;
  font-size: 16px;
  cursor: pointer;
  border-radius: 8px;
}

/* Features */
.features {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 50px;
  flex-wrap: wrap;
}

.card {
  background: #020617;
  padding: 25px;
  border-radius: 10px;
  width: 250px;
  text-align: center;
}

.card h3 {
  margin-bottom: 10px;
  color: #38bdf8;
}

/* Footer */
footer {
  text-align: center;
  padding: 20px;
  background: #020617;
  margin-top: 50px;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
  <h1>MyAI 🤖</h1>
  <div>
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Contact</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <h2>Your Smart AI Chatbot</h2>
  <p>Automate conversations, support users, and grow your business.</p>
  <button onclick="scrollToChat()">Start Chat</button>
</section>

<!-- Features -->
<section class="features">
  <div class="card">
    <h3>24/7 Support</h3>
    <p>Your chatbot works anytime.</p>
  </div>
  <div class="card">
    <h3>Easy Setup</h3>
    <p>No coding required.</p>
  </div>
  <div class="card">
    <h3>Smart AI</h3>
    <p>Handles real conversations.</p>
  </div>
</section>

<!-- Footer -->
<footer>
  <p>© 2026 MyAI Website</p>
</footer>

<!-- Chatbot -->
<zapier-interfaces-chatbot-embed 
  is-popup="true" 
  chatbot-id="cmn02qdyj0027g15pne8ji1w2">
</zapier-interfaces-chatbot-embed>

<script>
function scrollToChat() {
  alert("Click the chatbot icon at bottom-right 🤖");
}
</script>

</body>
</html>
